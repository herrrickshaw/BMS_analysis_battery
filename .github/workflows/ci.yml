name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Run tests
        run: pytest
        env:
          # No real Cassandra in CI — app falls back to CSV mode
          CASSANDRA_HOST: "127.0.0.1"

  lint-frontend:
    name: Lint & Build (Frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint-and-test, lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t herrrickshaw-backend ./backend

      - name: Build frontend image
        run: docker build -t herrrickshaw-frontend ./frontend
