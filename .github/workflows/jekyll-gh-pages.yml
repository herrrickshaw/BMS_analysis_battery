# Deploy the project website (docs/) to GitHub Pages with Jekyll.
# Adapted from GitHub's official "Deploy Jekyll with GitHub Pages dependencies
# preinstalled" starter workflow — builds from ./docs (the interactive site).
#
# Setup (one-time, in the GitHub UI):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# After that, every push to main rebuilds and publishes the site at
#   https://herrrickshaw.github.io/herrrickshaw/

name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:        # allow manual runs from the Actions tab

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true       # auto-enable Pages if not already on

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs        # the interactive site lives here
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
