name: Weekly Security Scan

on:
  schedule:
    # Run every Sunday at 2:00 AM UTC (9:30 AM IST)
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run secret scanning
        run: |
          pip install detect-secrets gitpython
          detect-secrets scan --baseline .secrets.baseline || true

      - name: Check for exposed credentials
        run: |
          pip install truffleHog3
          trufflehog filesystem . --json 2>/dev/null || echo "No credentials found"

      - name: Scan Python dependencies for vulnerabilities
        run: |
          pip install safety
          pip freeze | safety check --json || true

      - name: Scan for common security issues
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          echo "Security scan complete - check artifacts"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets.baseline
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secret detection completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Credential exposure check completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Bandit code security scan completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports available in [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
