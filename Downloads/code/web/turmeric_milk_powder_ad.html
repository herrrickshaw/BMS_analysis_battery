<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0f00;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .ad-wrapper {
    width: 100%;
    max-width: 680px;
    min-height: 520px;
    position: relative;
    background: linear-gradient(135deg, #1a0f00 0%, #2d1a00 40%, #3d2200 70%, #1a0f00 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  /* Radial glow */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    height: 420px;
    background: radial-gradient(ellipse, rgba(255,180,30,0.18) 0%, rgba(180,90,0,0.08) 50%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative circles */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,180,30,0.12);
    pointer-events: none;
  }
  .ring-1 { width: 360px; height: 360px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .ring-2 { width: 480px; height: 480px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(255,150,20,0.07); }
  .ring-3 { width: 580px; height: 580px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(220,120,10,0.05); }

  /* Decorative spice dots */
  .spice-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,170,30,0.25);
  }

  /* Steam lines */
  .steam-wrap {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 1;
  }
  .steam-line {
    width: 2px;
    height: 28px;
    background: linear-gradient(to top, rgba(255,210,100,0.5), transparent);
    border-radius: 2px;
    animation: rise 2.5s ease-in-out infinite;
  }
  .steam-line:nth-child(2) { animation-delay: 0.4s; height: 36px; }
  .steam-line:nth-child(3) { animation-delay: 0.8s; height: 22px; }
  @keyframes rise {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    40%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-24px) scaleX(1.6); }
  }

  /* Cup illustration */
  .cup-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 24px;
    margin-top: 16px;
  }
  .cup-svg { display: block; }

  /* Badge */
  .badge {
    display: inline-block;
    letter-spacing: 0.24em;
    font-size: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    color: #e8a830;
    text-transform: uppercase;
    border: 0.5px solid rgba(232,168,48,0.4);
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.1s ease both;
  }

  /* Headline */
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 700;
    color: #f5d070;
    line-height: 1.1;
    text-align: center;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.2s ease both;
    text-shadow: 0 2px 40px rgba(255,160,0,0.3);
  }
  .headline em {
    font-style: italic;
    color: #ffb830;
  }

  /* Subhead */
  .subhead {
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,220,140,0.75);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.04em;
    line-height: 1.6;
    max-width: 380px;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.35s ease both;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.4s ease both;
  }
  .divider-line { flex: 1; height: 0.5px; background: linear-gradient(to right, transparent, rgba(232,168,48,0.4), transparent); max-width: 80px; }
  .divider-dot { width: 5px; height: 5px; background: #e8a830; border-radius: 50%; }

  /* Pills */
  .pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.5s ease both;
  }
  .pill {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #c88a20;
    border: 0.5px solid rgba(200,138,32,0.35);
    padding: 5px 14px;
    border-radius: 14px;
    background: rgba(255,160,30,0.06);
    font-family: 'Cormorant Garamond', serif;
  }

  /* CTA */
  .cta-wrap {
    margin-top: 28px;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 1.65s ease both;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .cta-btn {
    background: linear-gradient(135deg, #e8930a 0%, #c97000 100%);
    color: #fff8e8;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    padding: 13px 36px;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(200,120,0,0.35);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(220,140,0,0.45); }
  .cta-note { font-size: 11px; color: rgba(200,160,60,0.55); letter-spacing: 0.08em; }

  /* Brand name bottom */
  .brand {
    position: absolute;
    bottom: 18px;
    right: 24px;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    color: rgba(200,150,40,0.4);
    letter-spacing: 0.15em;
    z-index: 2;
    text-transform: uppercase;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="ad-wrapper">
  <div class="glow"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <!-- Spice decorative dots -->
  <div class="spice-dot" style="width:6px;height:6px;top:18%;left:12%;"></div>
  <div class="spice-dot" style="width:4px;height:4px;top:30%;left:6%;"></div>
  <div class="spice-dot" style="width:8px;height:8px;top:70%;right:9%;opacity:0.5"></div>
  <div class="spice-dot" style="width:5px;height:5px;bottom:22%;left:14%;opacity:0.4"></div>

  <div class="badge">Ancient Wisdom · Modern Living</div>

  <!-- Steam -->
  <div class="steam-wrap">
    <div class="steam-line"></div>
    <div class="steam-line"></div>
    <div class="steam-line"></div>
  </div>

  <!-- Cup SVG -->
  <div class="cup-wrap">
    <svg class="cup-svg" width="120" height="110" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
      <!-- Saucer -->
      <ellipse cx="60" cy="100" rx="46" ry="7" fill="#8b4800" opacity="0.5"/>
      <ellipse cx="60" cy="98" rx="42" ry="5" fill="#b06010" opacity="0.7"/>
      <!-- Cup body -->
      <path d="M22 55 Q20 96 60 96 Q100 96 98 55 Z" fill="#c07018"/>
      <path d="M22 55 Q20 96 60 96 Q100 96 98 55 Z" fill="url(#cupGrad)" opacity="0.7"/>
      <!-- Cup rim -->
      <ellipse cx="60" cy="55" rx="38" ry="10" fill="#d4882a"/>
      <ellipse cx="60" cy="53" rx="36" ry="8" fill="#e09a32"/>
      <!-- Golden milk surface -->
      <ellipse cx="60" cy="53" rx="33" ry="6.5" fill="#f5c040" opacity="0.9"/>
      <ellipse cx="57" cy="51" rx="18" ry="3" fill="#ffd860" opacity="0.5"/>
      <!-- Handle -->
      <path d="M98 64 Q118 64 118 78 Q118 90 98 88" stroke="#b06010" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Turmeric swirl on surface -->
      <path d="M50 53 Q58 49 66 53 Q60 56 52 53" stroke="#e8a020" stroke-width="1.2" fill="none" opacity="0.8"/>
      <!-- Spice dust on rim -->
      <circle cx="40" cy="53" r="1.5" fill="#f08000" opacity="0.7"/>
      <circle cx="80" cy="52" r="1" fill="#f08000" opacity="0.5"/>
      <defs>
        <linearGradient id="cupGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
          <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <h1 class="headline">Golden in<br><em>every sip.</em></h1>
  <p class="subhead">Pure turmeric milk powder — blended with warming spices for a ritual that nourishes body and mind.</p>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="pills">
    <div class="pill">Anti-inflammatory</div>
    <div class="pill">Rich in Curcumin</div>
    <div class="pill">No Preservatives</div>
    <div class="pill">Ready in 60 seconds</div>
  </div>

  <div class="cta-wrap">
    <button class="cta-btn" onclick="sendPrompt('Tell me more about the health benefits of turmeric milk')">Discover the benefits ↗</button>
    <span class="cta-note">Just add warm milk or water</span>
  </div>

  <div class="brand">Golden Root Co.</div>
</div>
</body>
</html>
