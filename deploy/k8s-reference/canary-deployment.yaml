# Canary deployment strategy for progressive traffic shifting
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  labels:
    app: backend
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: canary
  template:
    metadata:
      labels:
        app: backend
        version: canary
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-canary
  labels:
    app: frontend
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: canary
  template:
    metadata:
      labels:
        app: frontend
        version: canary
    spec:
      serviceAccountName: frontend-sa
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-canary-service
  labels:
    app: backend
    version: canary
spec:
  type: ClusterIP
  selector:
    app: backend
    version: canary
  ports:
  - name: http
    port: 8000
    targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-canary-service
  labels:
    app: frontend
    version: canary
spec:
  type: ClusterIP
  selector:
    app: frontend
    version: canary
  ports:
  - name: http
    port: 3000
    targetPort: http
