---
# HPA for FastAPI backend with CPU and memory metrics
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-backend-hpa
  namespace: stock-analysis
  labels:
    app: fastapi-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-backend

  minReplicas: 3
  maxReplicas: 10

  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

    # Custom metric: HTTP requests per second
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "1000"

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

---
# HPA for Frontend (Nginx) - less aggressive than backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: stock-analysis
  labels:
    app: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  minReplicas: 3
  maxReplicas: 8

  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

---
# VPA for database resources (complementary to HPA)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: postgresql-vpa
  namespace: stock-analysis
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: postgresql
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 500m
          memory: 1Gi
        maxAllowed:
          cpu: 2
          memory: 4Gi
        controlledValues: RequestsAndLimits
        controlledResources:
          - cpu
          - memory

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cassandra-vpa
  namespace: stock-analysis
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: cassandra
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: "cassandra"
        minAllowed:
          cpu: 1000m
          memory: 2Gi
        maxAllowed:
          cpu: 4
          memory: 8Gi
        controlledValues: RequestsAndLimits
        controlledResources:
          - cpu
          - memory
      - containerName: "cassandra-exporter"
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: rabbitmq-vpa
  namespace: stock-analysis
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: rabbitmq
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: "rabbitmq"
        minAllowed:
          cpu: 250m
          memory: 512Mi
        maxAllowed:
          cpu: 1
          memory: 2Gi
        controlledValues: RequestsAndLimits
        controlledResources:
          - cpu
          - memory

---
# PrometheusRule for scaling alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: stock-analysis-scaling-alerts
  namespace: stock-analysis
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: kubernetes.rules
      interval: 30s
      rules:
        - alert: HighCPUUtilization
          expr: (sum(rate(container_cpu_usage_seconds_total{pod=~"fastapi-backend-.*"}[5m])) by (pod) / sum(kube_pod_container_resource_requests{pod=~"fastapi-backend-.*",resource="cpu"}) by (pod)) > 0.9
          for: 5m
          annotations:
            summary: "High CPU utilization on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} CPU usage is above 90%"

        - alert: HighMemoryUtilization
          expr: (sum(container_memory_usage_bytes{pod=~"fastapi-backend-.*"}) by (pod) / sum(kube_pod_container_resource_limits{pod=~"fastapi-backend-.*",resource="memory"}) by (pod)) > 0.9
          for: 5m
          annotations:
            summary: "High memory utilization on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} memory usage is above 90%"

        - alert: HPAMaxReplicasReached
          expr: kube_hpa_status_current_replicas{hpa="fastapi-backend-hpa"} >= kube_hpa_status_desired_replicas{hpa="fastapi-backend-hpa"}
          for: 10m
          annotations:
            summary: "HPA max replicas reached for {{ $labels.hpa }}"
            description: "HPA {{ $labels.hpa }} has reached its maximum replica count"

        - alert: DatabaseConnectionPoolExhausted
          expr: pg_stat_database_numbackends{datname="stock_analysis_db"} / pg_setting{name="max_connections"} > 0.85
          for: 5m
          annotations:
            summary: "PostgreSQL connection pool near exhaustion"
            description: "PostgreSQL connection pool utilization is above 85%"

        - alert: CassandraHighHeapUsage
          expr: cassandra_jvm_memory_used_bytes{area="heap"} / cassandra_jvm_memory_max_bytes{area="heap"} > 0.9
          for: 5m
          annotations:
            summary: "Cassandra JVM heap usage high on {{ $labels.instance }}"
            description: "Cassandra heap usage is above 90%"

        - alert: RabbitMQQueueBacklog
          expr: rabbitmq_queue_messages > 10000
          for: 5m
          annotations:
            summary: "RabbitMQ queue backlog detected"
            description: "Queue {{ $labels.queue }} has {{ $value }} messages pending"
