apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

commonLabels:
  app.kubernetes.io/name: event-stock-analysis
  app.kubernetes.io/part-of: event-stock-analysis

commonAnnotations:
  co.example/owner: "platform-team"

resources:
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - configmap.yaml
  - secrets.yaml

images:
  - name: backend
    newTag: latest
  - name: frontend
    newTag: latest

replicas:
  - name: backend-deployment
    count: 3
  - name: frontend-deployment
    count: 3

namePrefix: event-stock-

vars:
  - name: BACKEND_SERVICE_HOST
    objref:
      kind: Service
      name: backend-service
      apiVersion: v1
    fieldref:
      fieldpath: metadata.name
  - name: LOG_LEVEL
    objref:
      kind: ConfigMap
      name: app-config
      apiVersion: v1
    fieldref:
      fieldpath: data.LOG_LEVEL
