apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

commonLabels:
  environment: staging
  app.kubernetes.io/name: event-stock-analysis

bases:
  - ../base

patches:
  - target:
      kind: Deployment
      name: backend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m

  - target:
      kind: Deployment
      name: frontend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=DEBUG

ingress:
  - name: backend-ingress
    host: api-staging.event-stock-analysis.example.com
    service:
      name: backend-service
      port: 8000

replicas:
  - name: backend-deployment
    count: 2
  - name: frontend-deployment
    count: 1
