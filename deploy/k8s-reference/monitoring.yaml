---
# Prometheus ServiceMonitor for FastAPI backend
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fastapi-backend-monitor
  namespace: stock-analysis
  labels:
    app: fastapi-backend
spec:
  selector:
    matchLabels:
      app: fastapi-backend
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s

