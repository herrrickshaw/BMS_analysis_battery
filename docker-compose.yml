services:

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: herrrickshaw
      CASSANDRA_DC: dc1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.providers
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      LOG_JSON: "true"
    volumes:
      - ./data:/app/data:ro         # market instrument CSVs (read-only)
      - uploads:/app/uploads
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  cassandra_data:
  uploads:
