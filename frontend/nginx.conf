# ─────────────────────────────────────────────────────────────────────────────
# nginx configuration for the frontend container.
#
# nginx (pronounced "engine-x") is a high-performance web server.
# In our setup it does two jobs:
#   1. Serves the compiled React app (static files in /usr/share/nginx/html)
#   2. Forwards /api/* requests to the FastAPI backend container
#
# Without job 2, the browser would get CORS errors trying to call
# http://localhost:8000/api from the frontend origin http://localhost.
# With this proxy, the browser only ever talks to nginx on port 80, and nginx
# quietly passes the API calls on to the backend on port 8000.
# ─────────────────────────────────────────────────────────────────────────────

server {
    # Listen on port 80 (standard HTTP port).
    listen 80;

    # Accept requests for any hostname (including IP addresses).
    # In production you'd put your real domain here, e.g. "app.example.com".
    server_name _;

    # The folder where our compiled React files live (copied by Dockerfile).
    root /usr/share/nginx/html;

    # The file to serve when a directory is requested — normally index.html.
    index index.html;

    # Enable gzip compression.  This shrinks text responses (HTML, JS, CSS, JSON)
    # before sending them to the browser, reducing load time significantly.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Any URL starting with /api/ is NOT served from disk.
    # Instead nginx forwards it to the backend service on port 8000.
    # "backend" resolves to the backend container's IP inside Docker's network.
    location /api/ {
        proxy_pass         http://backend:8000/api/;

        # Pass the original client's info to the backend so it can log it.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Wait up to 2 minutes for slow responses (bulk fetch endpoints can be slow).
        proxy_read_timeout 120s;
    }

    # ── SPA (Single Page Application) fallback ────────────────────────────────
    # React handles its own URL routing in the browser (e.g. /portfolio, /scan).
    # But if someone refreshes the page at /portfolio, nginx gets a request for
    # that URL — and there's no /portfolio file on disk, so it would normally
    # return a 404 error.
    # try_files solves this: first look for a real file ($uri), then a real
    # folder ($uri/), and if neither exists, serve index.html so React can take
    # over routing in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
